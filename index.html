<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Star Sovereigns</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark"></span>
          <span>Star Sovereigns</span>
        </div>
        <div class="time-controls">
          <button id="menuBtn" class="square-button" data-action="open-menu" title="Open the main menu and galaxy setup controls">Menu</button>
          <button id="pauseBtn" class="square-button" title="Pause or resume monthly simulation">II</button>
          <button id="stepBtn" class="square-button" title="Advance one month">+1</button>
          <button id="speedBtn" class="square-button" title="Cycle the simulation speed">1x</button>
          <span id="dateLabel" class="date-label">Jan 2200</span>
        </div>
        <div id="resourceStrip" class="resource-strip"></div>
      </header>

      <main class="game-shell">
        <aside class="left-rail">
          <nav class="panel-tabs" aria-label="Left panel menu">
            <button class="panel-tab is-active" data-panel-menu="left" data-panel-target="empire" title="Show empire economy and build queue">Empire</button>
            <button class="panel-tab" data-panel-menu="left" data-panel-target="political" title="Show political ideology choices and modifiers">Political</button>
            <button class="panel-tab" data-panel-menu="left" data-panel-target="economic" title="Show economic ideology choices and modifiers">Economic</button>
            <button class="panel-tab" data-panel-menu="left" data-panel-target="research" title="Show research progress and queued research projects">Research</button>
          </nav>

          <section class="panel" data-left-panel="empire">
            <div class="panel-heading">
              <h2>Empire</h2>
              <button class="ghost-button" data-action="new-game" title="Open the main menu to start a new galaxy">New</button>
            </div>
            <div id="empirePanel"></div>
          </section>

          <section class="panel">
            <div class="panel-heading">
              <h2>Fleets</h2>
              <button class="ghost-button" data-action="center-home" title="Center the camera on the capital system">Home</button>
            </div>
            <div id="fleetPanel"></div>
          </section>

          <section class="panel" data-left-panel="political" hidden>
            <div class="panel-heading">
              <h2>Political Ideology</h2>
            </div>
            <div id="politicalPanel"></div>
          </section>

          <section class="panel" data-left-panel="economic" hidden>
            <div class="panel-heading">
              <h2>Economic Ideology</h2>
            </div>
            <div id="economicPanel"></div>
          </section>

          <section class="panel" data-left-panel="research" hidden>
            <div class="panel-heading">
              <h2>Research</h2>
            </div>
            <div id="researchPanel"></div>
          </section>
        </aside>

        <section class="map-stage">
          <canvas id="galaxyCanvas" aria-label="Galaxy map"></canvas>
          <div class="map-toolbar">
            <button class="map-mode is-active" data-map-mode="political" title="Switch to the political territory map">POL</button>
            <button class="map-mode" data-map-mode="economy" title="Switch to the resource economy map">ECO</button>
            <button class="map-mode" data-map-mode="science" title="Switch to the survey and anomaly map">SCI</button>
            <button class="map-mode" data-map-mode="military" title="Switch to the fleet and defense map">MIL</button>
            <button class="map-mode" data-action="toggle-icon-key" title="Open or close the icon key window">KEY</button>
            <button class="map-mode" data-action="zoom-out" title="Zoom the galaxy map out">-</button>
            <button class="map-mode" data-action="zoom-in" title="Zoom the galaxy map in">+</button>
          </div>
          <div id="territoryLegend" class="territory-legend"></div>
          <div id="iconKeyWindow" class="icon-key-window" hidden></div>
          <div id="toast" class="toast" hidden></div>
        </section>

        <aside class="right-rail">
          <nav class="panel-tabs" aria-label="Right panel menu">
            <button class="panel-tab is-active" data-panel-menu="right" data-panel-target="system" title="Show the selected system and colony menus">System</button>
            <button class="panel-tab" data-panel-menu="right" data-panel-target="diplomacy" title="Show diplomacy, wars, rivals, and embassies">Diplomacy</button>
            <button class="panel-tab" data-panel-menu="right" data-panel-target="log" title="Show the chronicle event log">Chronicle</button>
          </nav>

          <section class="panel inspector-panel" data-right-panel="system">
            <div class="panel-heading">
              <h2>System</h2>
              <span id="selectedTag" class="tag">None</span>
            </div>
            <div id="inspectorPanel"></div>
          </section>

          <section class="panel" data-right-panel="diplomacy" hidden>
            <div class="panel-heading">
              <h2>Diplomacy</h2>
            </div>
            <div id="diplomacyPanel"></div>
          </section>

          <section class="panel log-panel" data-right-panel="log" hidden>
            <div class="panel-heading">
              <h2>Chronicle</h2>
            </div>
            <div id="logPanel" class="log-list"></div>
          </section>
        </aside>
      </main>
    </div>

    <div id="modalBackdrop" class="modal-backdrop" hidden>
      <section class="modal">
        <div class="modal-kicker" id="modalKicker">Event</div>
        <h2 id="modalTitle"></h2>
        <p id="modalText"></p>
        <div id="modalOptions" class="modal-options"></div>
      </section>
    </div>

    <div id="mainMenu" class="menu-screen" hidden>
      <section class="menu-panel">
        <div class="menu-kicker">Command Interface</div>
        <h1>Star Sovereigns</h1>
        <p class="menu-copy">Forge a procedural galaxy, survey its systems, and command ships from the star map down to local orbit.</p>
        <div class="menu-grid">
          <label class="menu-field">
            <span>Galaxy Type</span>
            <select id="menuShape">
              <option value="spiral">Spiral Arms</option>
              <option value="barred">Barred Spiral</option>
              <option value="ring">Broken Ring</option>
              <option value="cluster">Star Clusters</option>
              <option value="elliptical">Elliptical Cloud</option>
              <option value="twin">Twin Core</option>
              <option value="rift">Great Rift</option>
            </select>
          </label>
          <label class="menu-field menu-range-field">
            <span>Galaxy Size <strong id="menuSizeValue">108</strong></span>
            <input id="menuSize" type="range" min="10" max="750" step="1" value="108" />
          </label>
          <label class="menu-field">
            <span>Seed</span>
            <input id="menuSeed" inputmode="numeric" maxlength="10" value="22000624" />
          </label>
          <label class="menu-field menu-range-field">
            <span>AI Empires <strong id="menuAiCountValue">4</strong></span>
            <input id="menuAiCount" type="range" min="2" max="50" step="1" value="4" />
          </label>
          <label class="menu-field">
            <span>AI Difficulty</span>
            <select id="menuDifficulty">
              <option value="cadet">Cadet</option>
              <option value="standard" selected>Standard</option>
              <option value="veteran">Veteran</option>
              <option value="admiral">Admiral</option>
            </select>
          </label>
        </div>
        <div class="menu-actions">
          <button id="startMenuBtn" class="menu-button primary" data-action="start-menu-game" title="Generate a new galaxy with these settings">Begin Galaxy</button>
          <button class="menu-button" data-action="randomize-seed" title="Roll a new procedural seed">Random Seed</button>
          <button id="resumeMenuBtn" class="menu-button" data-action="resume-game" title="Return to the current campaign">Resume</button>
        </div>
      </section>
    </div>

    <script src="src/main.js"></script>
  </body>
</html>
